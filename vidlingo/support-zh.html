<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>支持 vidlingo</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: #18181b;
        background: #fafafa;
      }
      .card {
        background: #ffffff;
        border: 1px solid #e4e4e7;
        border-radius: 16px;
        padding: 44px 40px;
        text-align: center;
        max-width: 320px;
      }
      h1 {
        font-size: 19px;
        margin: 0 0 24px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 20px;
        border-radius: 999px;
        border: 1px solid #f3a8c9;
        background: #fdf0f6;
        color: #9d174d;
        font-size: 14px;
        font-weight: 600;
        text-decoration: none;
        transition:
          background-color 0.15s ease,
          transform 0.1s ease;
      }
      .btn:hover {
        background: #fbe1ee;
        transform: translateY(-1px);
      }
      .btn svg {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
      }
      .back {
        display: inline-block;
        margin-top: 28px;
        font-size: 13px;
        color: #71717a;
        text-decoration: none;
      }
      .back:hover {
        text-decoration: underline;
      }
      /* Kept last on purpose — see vidlingo-homepage.html's own comment. */
      @media (prefers-color-scheme: dark) {
        body {
          color: #e4e4e7;
          background: #0a0a0f;
        }
        .card {
          background: #141419;
          border-color: #27272a;
        }
        .btn {
          background: #2a1220;
          border-color: #8a2f56;
          color: #fb9dc0;
        }
        .btn:hover {
          background: #391a2b;
        }
        .back {
          color: #a1a1aa;
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>支持 vidlingo</h1>
      <!-- No popup widget here — confirmed against Afdian's own developer
           docs (guide.afdian.com/creator/developer): their public API
           surface is webhook + order-query only, no client-side embed/
           overlay component exists to build one on top of, unlike Ko-fi's
           overlay-widget.js. A plain link is the honest option rather than
           guessing at an undocumented one. -->
      <a
        class="btn"
        href="https://www.ifdian.net/a/fluxora"
        target="_blank"
        rel="noopener noreferrer"
      >
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 21s-6.7-4.35-9.3-8.4C.9 9.7 1.7 6 4.9 4.9c2-.7 4 .1 5.1 1.8 1.1-1.7 3.1-2.5 5.1-1.8 3.2 1.1 4 4.8 2.2 7.7C18.7 16.65 12 21 12 21Z" />
        </svg>
        爱发电
      </a>
      <br />
      <a class="back" href="https://usefluxora.com/vidlingo/">← 返回 vidlingo</a>
    </div>
  </body>
</html>
