<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Support Fluxora / vidlingo</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='6' fill='%234f46e5'/%3E%3Cg fill='none' stroke='%23fff' stroke-width='2.25' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='m5 8 6 6'/%3E%3Cpath d='m4 14 6-6 2-3'/%3E%3Cpath d='M2 5h12'/%3E%3Cpath d='M7 2h1'/%3E%3Cpath d='m22 22-5-10-5 10'/%3E%3Cpath d='M14 18h6'/%3E%3C/g%3E%3C/svg%3E"
    />
    <!-- The extension's own getDonateUrl (settings-panel.tsx) never sends a
         Simplified-Chinese visitor here at all — it links straight to
         support-zh.html (Afdian) instead, since that page's own comment
         explains this page has no STRINGS entry for "zh" (only "zh-Hant"
         stays on Ko-fi). But that's not the only way to land on a URL: a
         shared link, a bookmark, a typo in a future integration. Without
         this, ?lang=zh would silently fall back to English strings with no
         hint a Chinese option even exists — a redirect here means the
         *page itself* is correct standalone, not just correct for the one
         path that currently reaches it. Placed before the Ko-fi widget
         script tag so a redirected visitor never pays for loading it. -->
    <script>
      if (new URLSearchParams(location.search).get("lang") === "zh") {
        location.replace("https://usefluxora.com/vidlingo/support-zh.html");
      }
    </script>
    <style>
      :root {
        color-scheme: light dark;
        --ink: #18181b;
        --muted: #71717a;
        --canvas: #fafafa;
        --surface: #ffffff;
        --border: #e4e4e7;
        --accent: #4f46e5;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
        padding: 24px;
        font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
        color: var(--ink);
        /* A soft radial wash behind the card instead of a flat fill — same
           accent hue as vidlingo-homepage.html's own tokens, at low enough
           opacity that it reads as atmosphere, not decoration competing
           with the card. */
        background: radial-gradient(60% 50% at 50% 38%, rgba(180, 83, 9, 0.08), transparent 70%), var(--canvas);
      }
      /* Compact brand mark above the card — the same logo every other
         usefluxora.com/vidlingo page uses (vidlingo-homepage.html's own
         header), so this page reads as part of the same site instead of a
         detached, unbranded popup. Links home rather than duplicating the
         `.back` link's destination redundantly right next to it. */
      .brand {
        display: flex;
        align-items: center;
        gap: 8px;
        text-decoration: none;
        color: var(--ink);
      }
      .brand-mark {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 26px;
        height: 26px;
        border-radius: 7px;
        background: var(--accent);
        color: #fff;
        flex-shrink: 0;
      }
      .brand-mark svg {
        width: 15px;
        height: 15px;
      }
      .brand-word {
        font-size: 16px;
        font-weight: 700;
        letter-spacing: -0.01em;
      }
      .brand-word b {
        color: var(--accent);
      }
      .card {
        position: relative;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 44px 40px;
        text-align: center;
        max-width: 320px;
        box-shadow: 0 24px 60px rgba(24, 24, 27, 0.1);
      }
      h1 {
        font-size: 19px;
        line-height: 1.35;
        margin: 0;
      }
      .back {
        display: inline-block;
        margin-top: 28px;
        font-size: 13px;
        color: var(--muted);
        text-decoration: none;
      }
      .back:hover {
        text-decoration: underline;
      }
      /* Same hand-drawn line-art treatment as .hint-arrow below, sharing
         its color — a coffee cup (Ko-fi's own "buy me a coffee" framing)
         with a small heart rising in the steam, so the card reads as an
         illustration with a label rather than a label alone. */
      .mug {
        display: block;
        margin: 0 auto 18px;
      }
      .mug .cup {
        stroke: #b45309;
      }
      .mug .steam {
        stroke: #b45309;
        opacity: 0.6;
      }
      .mug .heart {
        fill: #b45309;
      }
      /* Points from the card down to Ko-fi's own floating button — it only
         renders in a fixed bottom-left position (see the script comment
         below), so this is a fixed-position overlay tuned to that same
         corner rather than something laid out relative to the card itself.
         Swapped out below 700px for `.hint-arrow-mobile` instead of just
         hiding: a portrait phone still gets the floating button in the same
         corner, it just has no room for a 320px-tall curve alongside a card
         that already fills most of the viewport. */
      .hint-arrow {
        position: fixed;
        left: 48px;
        bottom: 88px;
        width: 180px;
        height: 320px;
        pointer-events: none;
      }
      .hint-arrow path {
        stroke: #b45309;
      }
      .hint-arrow .stem {
        stroke-dasharray: 480;
        stroke-dashoffset: 480;
        animation: draw-arrow 1.3s 0.4s ease-out forwards;
      }
      .hint-arrow .head {
        opacity: 0;
        animation: fade-head 0.3s 1.3s ease-out forwards;
      }
      @media (prefers-reduced-motion: reduce) {
        .hint-arrow .stem,
        .hint-arrow-mobile .stem {
          animation: none;
          stroke-dashoffset: 0;
        }
        .hint-arrow .head,
        .hint-arrow-mobile .head {
          animation: none;
          opacity: 1;
        }
      }
      @keyframes draw-arrow {
        to {
          stroke-dashoffset: 0;
        }
      }
      @keyframes fade-head {
        to {
          opacity: 1;
        }
      }
      /* Compact, in-flow companion to `.hint-arrow` for narrow viewports —
         sits right under the card (not fixed, so it never overlaps it) and
         curves toward the bottom-left corner Ko-fi's floating button always
         renders in, same destination as the desktop arrow just drawn small
         enough to fit. Hidden by default; the two media queries below swap
         which one shows. */
      .hint-arrow-mobile {
        display: none;
        width: 96px;
        height: 56px;
      }
      .hint-arrow-mobile path {
        stroke: #b45309;
      }
      .hint-arrow-mobile .stem {
        stroke-dasharray: 140;
        stroke-dashoffset: 140;
        animation: draw-arrow 1s 0.4s ease-out forwards;
      }
      .hint-arrow-mobile .head {
        opacity: 0;
        animation: fade-head 0.3s 1.1s ease-out forwards;
      }
      @media (max-width: 700px) {
        .hint-arrow {
          display: none;
        }
        .hint-arrow-mobile {
          display: block;
        }
      }
      /* Kept last on purpose — see vidlingo-homepage.html's own comment on
         why an earlier dark-mode block loses to later unconditional rules
         of the same specificity regardless of the media query matching. */
      @media (prefers-color-scheme: dark) {
        :root {
          --ink: #e4e4e7;
          --muted: #a1a1aa;
          --canvas: #0a0a0f;
          --surface: #141419;
          --border: #27272a;
          --accent: #818cf8;
        }
        body {
          background: radial-gradient(60% 50% at 50% 38%, rgba(240, 180, 41, 0.06), transparent 70%), var(--canvas);
        }
        .hint-arrow path,
        .hint-arrow-mobile path {
          stroke: #f0b429;
        }
        .mug .cup,
        .mug .steam {
          stroke: #f0b429;
        }
        .mug .heart {
          fill: #f0b429;
        }
      }
    </style>
  </head>
  <body>
    <a class="brand" id="brand" href="https://usefluxora.com/vidlingo/">
      <span class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round">
          <path d="m5 8 6 6" /><path d="m4 14 6-6 2-3" /><path d="M2 5h12" /><path d="M7 2h1" /><path d="m22 22-5-10-5 10" /><path d="M14 18h6" />
        </svg>
      </span>
      <span class="brand-word">vid<b>lingo</b></span>
    </a>

    <div class="card">
      <svg
        class="mug"
        viewBox="0 0 88 88"
        width="76"
        height="76"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
        aria-hidden="true"
      >
        <path class="steam" d="M30 34 C 26 29, 32 25, 28 19" stroke-width="2.5" stroke-linecap="round" />
        <path class="steam" d="M54 34 C 58 29, 52 25, 56 19" stroke-width="2.5" stroke-linecap="round" />
        <path
          class="heart"
          d="M42 6 C 42 2 36 2 36 7 C 36 11 42 15 42 18 C 42 15 48 11 48 7 C 48 2 42 2 42 6 Z"
        />
        <path
          class="cup"
          d="M22 34 L26 64 Q26 70 32 70 L52 70 Q58 70 58 64 L62 34 Z"
          stroke-width="3"
          stroke-linejoin="round"
        />
        <path class="cup" d="M62 40 Q76 40 76 52 Q76 64 62 62" stroke-width="3" />
      </svg>
      <h1 id="heading">Support Fluxora / vidlingo</h1>
      <a class="back" id="back" href="https://usefluxora.com/vidlingo/">← Back to vidlingo</a>
    </div>

    <!-- Purely decorative — the card above sits alone in a lot of empty
         space with the real call-to-action (Ko-fi's floating button, drawn
         by the script below) tucked in the bottom-left corner. A hand-drawn-
         style curved arrow, not a straight ruled line, points from the card
         toward it so the corner reads as "the rest of this page" rather
         than an unrelated stray element. `aria-hidden`: adds nothing a
         screen reader needs — the destination is already a real button
         with its own label. -->
    <svg
      class="hint-arrow"
      viewBox="0 0 180 320"
      fill="none"
      xmlns="http://www.w3.org/2000/svg"
      aria-hidden="true"
    >
      <path
        class="stem"
        d="M 158 10 C 120 55, 145 110, 95 145 C 55 175, 85 210, 45 240 C 30 255, 24 270, 22 286"
        stroke-width="3"
        stroke-linecap="round"
        fill="none"
      />
      <path
        class="head"
        d="M 8 280 L 22 300 L 36 282"
        stroke-width="3"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"
      />
    </svg>

    <!-- Narrow-viewport companion to `.hint-arrow` above (see its own CSS
         comment) — same destination (Ko-fi's floating button, bottom-left),
         just small enough to sit in-flow under the card instead of needing
         320px of fixed-position height a portrait phone doesn't have. -->
    <svg
      class="hint-arrow-mobile"
      viewBox="0 0 96 56"
      fill="none"
      xmlns="http://www.w3.org/2000/svg"
      aria-hidden="true"
    >
      <path
        class="stem"
        d="M 86 8 C 60 8, 40 8, 24 26 C 14 37, 10 44, 8 50"
        stroke-width="3"
        stroke-linecap="round"
        fill="none"
      />
      <path
        class="head"
        d="M 2 42 L 8 54 L 18 46"
        stroke-width="3"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"
      />
    </svg>

    <!-- Ko-fi's own officially-supported widget — confirmed live: their raw
         `?widget=true&embed=true` iframe embed sits behind a Cloudflare
         bot-check and renders blank; the older inline-button API
         (kofiwidget2.js) no longer defines anything at all (dead script);
         this script-based floating button is the one integration
         confirmed to actually render and open its donation popup with no
         page navigation. It only supports `type: 'floating-chat'` (checked
         the script source directly) — a fixed bottom-left position, not
         configurable to render inside the card above (a centering
         override was tried and silently ignored) — a deliberate trade-off
         to keep the real popup rather than falling back to a plain
         outbound link. -->
    <script src="https://storage.ko-fi.com/cdn/scripts/overlay-widget.js"></script>
    <script>
      // This page's own tiny bit of copy — deliberately not a framework/
      // i18next dependency for two strings. `lang` mirrors the extension's
      // own UiLanguage codes (settings.ts) so the same query param the
      // extension already knows how to send just works; unrecognized/
      // missing values fall back to English. "zh" (Simplified) isn't
      // listed here since the extension sends those visitors to
      // vidlingo-support-zh.html (Afdian) instead of this page at all —
      // "zh-Hant" (Traditional, Taiwan/HK) IS listed here on purpose: it
      // stays on Ko-fi (see settings-panel.tsx's getDonateUrl), since
      // Afdian is a mainland-China-oriented platform Traditional-reading
      // users don't need and Ko-fi already works fine for.
      //
      // Every heading explicitly names "Fluxora" alongside "vidlingo" (not
      // just "vidlingo" alone, the pre-existing wording) — Ko-fi's own
      // popup this page opens (see kofiWidgetOverlay.draw below) is tied to
      // the "fluxora" account/page name, which a visitor who only knows
      // this as "vidlingo" would otherwise find confusing right after
      // clicking a button that only ever said "vidlingo."
      //
      // `button` only localizes the floating button's own visible label —
      // confirmed by reading storage.ko-fi.com/cdn/scripts/overlay-widget.js
      // directly, the popup it opens is Ko-fi's own hosted iframe
      // (`ko-fi.com/{page}/?hidefeed=true&widget=true&embed=true`, built in
      // loadKofiIframe()) with no language/locale parameter anywhere in the
      // script or the URL it constructs — that content is entirely outside
      // this page's control.
      var STRINGS = {
        en: { heading: "Support Fluxora / vidlingo", back: "← Back to vidlingo", button: "Support me" },
        ja: { heading: "Fluxora（vidlingo）を応援する", back: "← vidlingo に戻る", button: "応援する" },
        de: { heading: "Fluxora (vidlingo) unterstützen", back: "← Zurück zu vidlingo", button: "Unterstützen" },
        fr: { heading: "Soutenir Fluxora (vidlingo)", back: "← Retour à vidlingo", button: "Soutenir" },
        pt: { heading: "Apoiar a Fluxora (vidlingo)", back: "← Voltar ao vidlingo", button: "Apoiar" },
        es: { heading: "Apoyar a Fluxora (vidlingo)", back: "← Volver a vidlingo", button: "Apoyar" },
        ko: { heading: "Fluxora(vidlingo) 후원하기", back: "← vidlingo로 돌아가기", button: "후원하기" },
        "zh-Hant": { heading: "支持 Fluxora（vidlingo）", back: "← 返回 vidlingo", button: "支持" },
      };
      var lang = new URLSearchParams(location.search).get("lang");
      var t = STRINGS[lang] || STRINGS.en;
      document.title = t.heading;
      document.getElementById("heading").textContent = t.heading;
      document.getElementById("back").textContent = t.back;

      // Both links back to the homepage only ever pointed at the bare
      // "https://usefluxora.com/vidlingo/" URL — translating `.back`'s own
      // text above (t.back) made it *look* localized, but clicking either
      // link always dropped straight back to English on the next page.
      // Appended only when non-English, mirroring homepage.html's own
      // privacy-link fix.
      if (lang && lang !== "en" && STRINGS[lang]) {
        var query = "?lang=" + encodeURIComponent(lang);
        document.getElementById("back").href = "https://usefluxora.com/vidlingo/" + query;
        document.getElementById("brand").href = "https://usefluxora.com/vidlingo/" + query;
      }

      kofiWidgetOverlay.draw("fluxora", {
        type: "floating-chat",
        "floating-chat.donateButton.text": t.button,
        "floating-chat.donateButton.background-color": "#92400e",
        "floating-chat.donateButton.text-color": "#fff",
      });
    </script>
  </body>
</html>
