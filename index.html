<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fluxora — An independent studio building small, focused tools</title>
    <!-- The studio's real brand mark (see store-assets/brand/ — the flowing-F
         aurora monogram, gradient teal->indigo->magenta) rather than the
         placeholder "flow lines" glyph this page started with — kept as a
         self-contained data URI (not a separate file) so there's nothing
         extra for `just publishSite` to copy across, same reasoning as the
         icon it replaces. Same path data as the header's own .brand-mark
         SVG below, just carrying its own gradient fill since a favicon has
         no CSS to inherit one from. -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Cdefs%3E%3ClinearGradient id='a' x1='0' y1='0' x2='512' y2='512' gradientUnits='userSpaceOnUse'%3E%3Cstop offset='0' stop-color='%230d9488'/%3E%3Cstop offset='0.5' stop-color='%236366f1'/%3E%3Cstop offset='1' stop-color='%23c026d3'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='512' height='512' rx='112' fill='url(%23a)'/%3E%3Cpath d='M 176 130 C 150 130, 150 170, 176 172 C 230 176, 320 150, 372 118 C 388 108, 400 128, 386 142 C 330 184, 240 214, 178 210 C 176 210, 176 210, 176 210 C 172 244, 210 250, 250 240 C 290 230, 322 206, 344 184 C 358 170, 378 188, 366 204 C 336 240, 282 270, 226 276 C 204 278, 176 270, 176 270 L 176 400 C 176 424, 138 424, 138 400 L 138 156 C 138 138, 155 130, 176 130 Z' fill='%23fff'/%3E%3C/svg%3E"
    />
    <!-- Matches the new brand accent (indigo, the gradient's own middle
         stop) — light/dark variants so the browser chrome/status-bar tint
         tracks whichever theme actually renders, same split the page's own
         CSS already does via prefers-color-scheme. -->
    <meta name="theme-color" content="#6366f1" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#818cf8" media="(prefers-color-scheme: dark)" />
    <style>
      :root {
        color-scheme: light dark;
        /* Same token names/shape as vidlingo-homepage.html's own system —
           `--accent` is the aurora brand mark's own middle gradient stop
           (indigo), not vidlingo's own slightly different indigo
           (#4f46e5) — close enough to read as the same studio family,
           distinct enough that this page doesn't look like a re-skinned
           copy of one project's page. */
        --ink: #18181b;
        --muted: #52525b;
        --faint: #71717a;
        --canvas: #fafafa;
        --surface: #ffffff;
        --border: #e4e4e7;
        --accent: #6366f1;
        --accent-soft: #eef2ff;
      }
      * {
        box-sizing: border-box;
      }
      body {
        max-width: 640px;
        margin: 0 auto;
        padding: 72px 24px 96px;
        font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
        line-height: 1.6;
        color: var(--ink);
        background: var(--canvas);
      }
      a {
        color: var(--accent);
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 11px;
      }
      /* The studio's real brand mark — a flowing "F" ribbon monogram on the
         same three-stop aurora gradient (teal->indigo->magenta) as the
         favicon and store-assets/brand/'s own avatar files, replacing the
         placeholder two-line "flow" glyph this page started with. Signature
         element for this specific page, kept to exactly one place. */
      .brand-mark {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 34px;
        height: 34px;
        border-radius: 9px;
        background: linear-gradient(135deg, #0d9488, #6366f1, #c026d3);
        color: #fff;
        flex-shrink: 0;
      }
      .brand-mark svg {
        width: 19px;
        height: 19px;
      }
      h1 {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.01em;
        margin: 0;
      }
      .tagline {
        color: var(--muted);
        font-size: 15.5px;
        max-width: 42ch;
        margin: 20px 0 0;
      }
      h2 {
        font-size: 13px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--faint);
        margin: 48px 0 12px;
      }
      .card {
        display: flex;
        gap: 14px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 18px 20px;
      }
      .card-mark {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 30px;
        height: 30px;
        border-radius: 8px;
        background: var(--accent-soft);
        color: var(--accent);
        flex-shrink: 0;
      }
      .card-mark svg {
        width: 17px;
        height: 17px;
      }
      .card-body a {
        font-weight: 600;
        text-decoration: none;
        font-size: 15.5px;
      }
      .card-body a:hover {
        text-decoration: underline;
      }
      .card-body p {
        margin: 4px 0 0;
        font-size: 14px;
        color: var(--muted);
      }
      footer {
        margin-top: 48px;
        padding-top: 20px;
        border-top: 1px solid var(--border);
        font-size: 14px;
        color: var(--muted);
      }
      footer a {
        color: inherit;
        font-weight: 600;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --ink: #e4e4e7;
          --muted: #a1a1aa;
          --faint: #71717a;
          --canvas: #0a0a0f;
          --surface: #141419;
          --border: #27272a;
          --accent: #818cf8;
          --accent-soft: rgba(129, 140, 248, 0.12);
        }
        /* No .brand-mark override needed here — it's a saturated gradient
           box with a solid-white glyph on top, not a flat accent-colored
           one, so it reads fine against either canvas as-is. */
      }
    </style>
  </head>
  <body>
    <div class="brand">
      <span class="brand-mark">
        <svg viewBox="0 0 512 512" fill="currentColor" aria-hidden="true">
          <path
            d="M 176 130
               C 150 130, 150 170, 176 172
               C 230 176, 320 150, 372 118
               C 388 108, 400 128, 386 142
               C 330 184, 240 214, 178 210
               C 176 210, 176 210, 176 210
               C 172 244, 210 250, 250 240
               C 290 230, 322 206, 344 184
               C 358 170, 378 188, 366 204
               C 336 240, 282 270, 226 276
               C 204 278, 176 270, 176 270
               L 176 400
               C 176 424, 138 424, 138 400
               L 138 156
               C 138 138, 155 130, 176 130 Z"
          />
        </svg>
      </span>
      <h1>Fluxora</h1>
    </div>
    <p class="tagline">An independent studio building small, focused tools.</p>

    <h2>Projects</h2>
    <div class="card">
      <span class="card-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round">
          <path d="m5 8 6 6" /><path d="m4 14 6-6 2-3" /><path d="M2 5h12" /><path d="M7 2h1" /><path d="m22 22-5-10-5 10" /><path d="M14 18h6" />
        </svg>
      </span>
      <div class="card-body">
        <a href="/vidlingo/">vidlingo</a>
        <p>Bilingual subtitles + flashcards for any YouTube video, in a browser side panel.</p>
      </div>
    </div>

    <footer>
      Questions or feedback: <a href="mailto:support@usefluxora.com">support@usefluxora.com</a>
    </footer>
  </body>
</html>
