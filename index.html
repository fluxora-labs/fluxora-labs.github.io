<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fluxora</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        max-width: 640px;
        margin: 80px auto;
        padding: 0 24px;
        font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
        line-height: 1.6;
        color: #18181b;
        background: #fafafa;
      }
      @media (prefers-color-scheme: dark) {
        body {
          color: #e4e4e7;
          background: #0a0a0f;
        }
        a {
          color: #a78bfa;
        }
        .card {
          background: #141419;
          border-color: #27272a;
        }
      }
      h1 {
        font-size: 28px;
        margin-bottom: 4px;
      }
      .tagline {
        color: #71717a;
        font-size: 15px;
        margin-bottom: 28px;
      }
      h2 {
        font-size: 16px;
        text-transform: uppercase;
        letter-spacing: 0.03em;
        color: #71717a;
        margin-top: 32px;
        margin-bottom: 8px;
      }
      .card {
        background: #ffffff;
        border: 1px solid #e4e4e7;
        border-radius: 12px;
        padding: 16px 20px;
        margin: 8px 0;
      }
      .card a {
        font-weight: 600;
        text-decoration: none;
      }
      .card p {
        margin: 4px 0 0;
        font-size: 14px;
        color: #71717a;
      }
    </style>
  </head>
  <body>
    <h1>Fluxora</h1>
    <p class="tagline">An independent studio building small, focused tools.</p>

    <h2>Projects</h2>
    <div class="card">
      <a href="/vidlingo/">vidlingo</a>
      <p>Bilingual subtitles + flashcards for any YouTube video, in a browser side panel.</p>
    </div>

    <h2>Contact</h2>
    <p><a href="mailto:support@usefluxora.com">support@usefluxora.com</a></p>
  </body>
</html>
